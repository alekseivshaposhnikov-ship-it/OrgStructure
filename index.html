<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Org-Chart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: Inter, sans-serif;
      }

      body {
        display: flex;
        height: 100vh; /* 🔥 важно */
      }

      .container {
        width: 350px;
        padding: 16px;
        box-sizing: border-box;
        border-right: 1px solid #ddd;
        overflow-y: auto;
      }

      #orgChartContainer {
        flex: 1;
        height: 100vh; /* 🔥 критично */
        overflow: hidden;
      }

      #orgChart {
        width: 100%;
        height: 100%;
      }

      h1 {
        margin-top: 0;
        font-size: 20px;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .file-label,
      .switch-label,
      .select-label {
        font-size: 14px;
      }

      button {
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #4338ca;
      }
    </style>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <!-- Сначала d3 -->
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <!-- Затем d3-flextree -->
    <script src="https://cdn.jsdelivr.net/npm/d3-flextree@2.1.2/build/d3-flextree.min.js"></script>
    <!-- И в конце сама библиотека org-chart -->
    <script src="https://cdn.jsdelivr.net/npm/d3-org-chart@2.6.0/build/d3-org-chart.min.js"></script>
  </head>

  <body>
    <div class="container">
      <h1>Организационная структура</h1>

      <div class="controls">
        <label class="file-label">
          <input type="file" id="fileInput" accept=".json" />
          <span>📂 Загрузить департаменты</span>
        </label>

        <label class="file-label">
          <input type="file" id="usersInput" accept=".json" />
          <span>👥 Загрузить пользователей</span>
        </label>

        <label class="switch-label">
          <input type="checkbox" id="showAll" />
          Показывать все уровни департаментов
        </label>

        <label class="select-label">
          Выберите департамент:
          <select id="departmentSelect">
            <option value="">-- Выберите департамент --</option>
          </select>
        </label>

        <button id="exportPptx">Экспорт в PPTX</button>
        <button id="exportDrawio">Экспорт в draw.io</button>
      </div>

      <div id="treeContainer" class="tree-container"></div>
    </div>

    <!-- 🔥 ВАЖНО: div, а не svg -->
    <div id="orgChartContainer">
      <div id="orgChart"></div>
    </div>

    <!-- 🔥 Только модуль -->
    <script type="module" src="/main.js"></script>
  </body>
</html>
