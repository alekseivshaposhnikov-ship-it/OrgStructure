<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Org Structure Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./main.js"></script>
  </head>

  <body>
    <div class="sidebar">
      <h1>Организационная структура</h1>

      <div class="controls">
        <button id="exportPdf">📄 Экспорт в PDF</button>

        <button id="openChangelog" type="button" class="changelog-button">
          Что нового
          <span id="changelogBadge" class="changelog-button__badge hidden">NEW</span>
        </button>

        <label class="vacancy-toggle">
          <input id="exportWithoutNames" type="checkbox" />
          Выгружать PDF без фамилий
        </label>

        <label class="vacancy-toggle">
          <input id="showVacancies" type="checkbox" checked />
          Показывать вакансии
        </label>

        <label class="design-switcher">
          <span>Дизайн карточек</span>
          <select id="cardDesign">
            <option value="classic">Текущий</option>
            <option value="variant2">Вариант 2 — цветная шапка</option>
            <option value="variant3">Вариант 3 — руководитель</option>
          </select>
        </label>
      </div>

      <div class="scenario-panel">
        <div class="scenario-panel__title">Сценарий моделирования</div>

        <label class="scenario-field">
          <span>Название сценария</span>
          <input id="scenarioName" type="text" />
        </label>

        <label class="scenario-field">
          <span>Режим отображения</span>
          <select id="viewMode">
            <option value="as-is">Текущая структура</option>
            <option value="to-be">Целевая структура</option>
            <option value="changes">Изменения</option>
          </select>
        </label>

        <div id="scenarioStats" class="scenario-stats"></div>

        <div class="scenario-actions">
          <button id="compareScenario" type="button">Сравнить</button>
          <button id="resetScenario" type="button" class="button-secondary">Сбросить</button>
        </div>
      </div>

      <div id="tree-container" class="tree-container"></div>
    </div>

    <div id="chartPanel">
      <div id="orgChart"></div>
    </div>

    <aside class="changes-panel">
      <div class="changes-panel__header">
        <h2>Изменения</h2>
        <span id="changesCount">0</span>
      </div>
      <div id="changesList" class="changes-list"></div>
    </aside>

    <div id="employeeModal" class="employee-modal hidden">
      <div class="employee-modal__backdrop"></div>
      <div class="employee-modal__card">
        <button id="closeEmployeeModal" class="employee-modal__close">×</button>
        <div id="employeeDetails"></div>
      </div>
    </div>

    <div id="scenarioModal" class="scenario-modal hidden">
      <div class="scenario-modal__backdrop"></div>
      <div class="scenario-modal__card">
        <button id="closeScenarioModal" class="scenario-modal__close">×</button>
        <h2 id="scenarioModalTitle"></h2>
        <form id="scenarioForm"></form>
      </div>
    </div>

    <div id="compareModal" class="scenario-modal hidden">
      <div class="scenario-modal__backdrop" data-close-compare></div>
      <div class="scenario-modal__card scenario-modal__card--wide">
        <button id="closeCompareModal" class="scenario-modal__close">×</button>
        <h2>Сравнение AS IS / TO BE</h2>
        <div id="compareContent"></div>
      </div>
    </div>

    <div id="changelogModal" class="scenario-modal hidden">
      <div class="scenario-modal__backdrop" data-close-changelog></div>
      <div class="scenario-modal__card scenario-modal__card--wide changelog-modal__card">
        <button id="closeChangelogModal" class="scenario-modal__close">×</button>
        <div class="changelog-modal__header">
          <div>
            <div class="changelog-modal__eyebrow">Журнал обновлений</div>
            <h2>Что нового</h2>
          </div>
          <div id="changelogLatestVersion" class="changelog-modal__version"></div>
        </div>
        <div id="changelogContent" class="changelog-content"></div>
      </div>
    </div>
  </body>
</html>
