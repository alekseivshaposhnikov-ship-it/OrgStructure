<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Org Structure Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Организационная структура</h1>

        <div class="controls">
            <input type="file" id="fileInput" accept=".json">
            
            <label class="switch-label">
                <input type="checkbox" id="showAll"> Показывать все уровни департаментов
            </label>

            <label>
                Выберите департамент:
                <select id="departmentSelect">
                    <option value="">-- Выберите департамент --</option>
                </select>
            </label>

            <button id="exportPptx">Экспорт в PPTX</button>
        </div>

        <div id="treeContainer" class="tree-container"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
